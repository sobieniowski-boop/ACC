name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/**"
      - ".github/workflows/**"
      - "docker-compose*.yml"
      - "infrastructure/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - ".github/workflows/**"

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  API_IMAGE: acc-api
  WEB_IMAGE: acc-web
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── Stage 1: Security Scanning ─────────────────────────────────────
  security-backend:
    name: Security Scan (Backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt pip-audit bandit

      - name: Dependency audit (pip-audit)
        run: pip-audit --strict --desc --output=pip-audit-report.json --format=json
        continue-on-error: true

      - name: SAST scan (Bandit)
        run: bandit -r app/ -f json -o bandit-report.json --severity-level medium
        continue-on-error: true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-backend
          path: |
            apps/api/pip-audit-report.json
            apps/api/bandit-report.json

  security-frontend:
    name: Security Scan (Frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high --json > npm-audit-report.json 2>&1 || true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-frontend
          path: apps/web/npm-audit-report.json

  # ── Stage 2: Automated Testing ─────────────────────────────────────
  test-backend:
    name: Test (Backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check app/ --select E,F,W --ignore E501

      - name: Type check (mypy) — informational
        run: |
          pip install mypy
          mypy app/ --ignore-missing-imports --no-error-summary || true
        continue-on-error: true

      - name: Test (pytest)
        run: pytest tests/ -v --tb=short --cov=app --cov-report=xml:coverage.xml --cov-report=term-missing
        env:
          APP_ENV: test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/api/coverage.xml

      - name: Export OpenAPI schema
        run: python -c "from app.main import app; import json; print(json.dumps(app.openapi()))" > openapi.json
        continue-on-error: true

      - name: Upload OpenAPI schema
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: apps/api/openapi.json

  test-frontend:
    name: Test (Frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npx eslint src/ --max-warnings=100
        continue-on-error: true

      - name: Type check (tsc)
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Test (vitest)
        run: npm test

      - name: Coverage (vitest)
        run: npx vitest run --coverage
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: apps/web/coverage/

  # ── Stage 3: Build & Push Container Images ─────────────────────────
  build-api:
    name: Build & Push (API)
    runs-on: ubuntu-latest
    needs: [security-backend, test-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
        if: env.REGISTRY != ''

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY && format('{0}/{1}', env.REGISTRY, env.API_IMAGE) || env.API_IMAGE }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: ${{ env.REGISTRY != '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.API_IMAGE }}:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true
        if: env.REGISTRY == ''

  build-web:
    name: Build & Push (Web)
    runs-on: ubuntu-latest
    needs: [security-frontend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
        if: env.REGISTRY != ''

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY && format('{0}/{1}', env.REGISTRY, env.WEB_IMAGE) || env.WEB_IMAGE }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          push: ${{ env.REGISTRY != '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.WEB_IMAGE }}:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          ignore-unfixed: true
        if: env.REGISTRY == ''

  # ── Stage 4: Deploy (Blue-Green) ───────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
        if: secrets.AZURE_CREDENTIALS != ''

      - name: Deploy to staging (Docker Compose over SSH)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/acc
            git pull origin main

            # Pull latest images or build locally
            if [ -n "${{ secrets.ACR_LOGIN_SERVER }}" ]; then
              docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }}
              export API_IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/acc-api:${{ github.sha }}
              export WEB_IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/acc-web:${{ github.sha }}
              docker compose -f docker-compose.yml -f docker-compose.prod.yml pull api web
            else
              docker compose -f docker-compose.yml -f docker-compose.prod.yml build
            fi

            # Blue-green: start new containers, health check, then swap
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps --remove-orphans api worker web

            # Health check (wait up to 60s)
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8000/api/v1/health > /dev/null 2>&1; then
                echo "Health check passed"
                exit 0
              fi
              echo "Waiting for API... ($i/12)"
              sleep 5
            done
            echo "Health check failed — rolling back"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml down
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            exit 1
        if: secrets.STAGING_HOST != ''

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
        if: secrets.AZURE_CREDENTIALS != ''

      - name: Deploy to production (Docker Compose over SSH)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/acc

            # Save rollback point
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps --format json > /tmp/acc-rollback-state.json
            PREV_API=$(docker inspect acc_api --format '{{.Image}}' 2>/dev/null || echo "none")
            PREV_WEB=$(docker inspect acc_web --format '{{.Image}}' 2>/dev/null || echo "none")
            echo "$PREV_API" > /tmp/acc-rollback-api-image
            echo "$PREV_WEB" > /tmp/acc-rollback-web-image

            git pull origin main

            # Pull or build
            if [ -n "${{ secrets.ACR_LOGIN_SERVER }}" ]; then
              docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} -p ${{ secrets.ACR_PASSWORD }}
              export API_IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/acc-api:${{ github.sha }}
              export WEB_IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/acc-web:${{ github.sha }}
              docker compose -f docker-compose.yml -f docker-compose.prod.yml pull api web
            else
              docker compose -f docker-compose.yml -f docker-compose.prod.yml build
            fi

            # Deploy with rolling restart
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps --remove-orphans api worker web

            # Health check (wait up to 90s)
            for i in $(seq 1 18); do
              if curl -sf http://localhost:8000/api/v1/health > /dev/null 2>&1; then
                echo "Production deploy succeeded"
                docker image prune -f
                exit 0
              fi
              echo "Waiting for API... ($i/18)"
              sleep 5
            done

            # Rollback on failure
            echo "ROLLING BACK — health check failed"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml down
            git checkout HEAD~1
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            exit 1
        if: secrets.PRODUCTION_HOST != ''

  # ── Stage 5: Post-Deploy Verification ──────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always() && needs.deploy-production.result == 'success'

    steps:
      - name: API health check
        run: |
          if [ -n "${{ vars.PRODUCTION_URL }}" ]; then
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${{ vars.PRODUCTION_URL }}/api/v1/health" || echo "000")
            echo "Health endpoint: HTTP $STATUS"
            [ "$STATUS" = "200" ] || exit 1
          else
            echo "No production URL configured — skipping smoke test"
          fi
