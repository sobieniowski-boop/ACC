name: ACC CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend lint + test ────────────────────────────────────────────
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio pytest-cov

      - name: Lint (ruff)
        run: ruff check app/ --select E,F,W --ignore E501

      - name: Run tests
        run: |
          pytest tests/ \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -x -q \
            || true
        env:
          APP_ENV: test
          MSSQL_USER: ""
          MSSQL_PASSWORD: ""

      - name: Export OpenAPI schema
        run: python -m scripts.export_openapi openapi.json
        continue-on-error: true
        env:
          APP_ENV: test
          MSSQL_USER: ""
          MSSQL_PASSWORD: ""

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/api/coverage.xml

      - name: Upload OpenAPI schema
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: apps/api/openapi.json

  # ── Frontend lint + build ──────────────────────────────────────────
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npx eslint src/ --max-warnings=100
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Test (vitest)
        run: npm test

      - name: Test coverage
        run: npx vitest run --coverage
        continue-on-error: true

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: apps/web/coverage/

      - name: Build
        run: npm run build

  # ── Docker build (API) ────────────────────────────────────────────
  docker-api:
    name: Docker Build (API)
    runs-on: ubuntu-latest
    needs: [backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: apps/api
          push: false
          tags: acc-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Docker build (Web) ────────────────────────────────────────────
  docker-web:
    name: Docker Build (Web)
    runs-on: ubuntu-latest
    needs: [frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          push: false
          tags: acc-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
