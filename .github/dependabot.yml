version: 2
updates:
  # Python backend dependencies
  - package-ecosystem: pip
    directory: "/apps/api"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    reviewers:
      - "msobieniowski"

  # Node.js frontend dependencies
  - package-ecosystem: npm
    directory: "/apps/web"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    reviewers:
      - "msobieniowski"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"

  # Terraform providers
  - package-ecosystem: terraform
    directory: "/infrastructure/terraform"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "infrastructure"
