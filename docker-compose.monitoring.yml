## ACC Monitoring Stack — Prometheus + Grafana + Loki
## Usage: docker compose -f docker-compose.monitoring.yml up -d
## Dashboards: http://localhost:3000 (admin/acc-monitor-2026)
## Prometheus: http://localhost:9090

services:
  # ── Prometheus — Metrics Collection ────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: acc_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=5GB"
      - "--web.enable-lifecycle"
    networks:
      - monitoring
      - default

  # ── Grafana — Dashboards & Visualization ───────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: acc_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: acc-monitor-2026
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-piechart-panel"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - monitoring

  # ── Loki — Log Aggregation ─────────────────────────────────────
  loki:
    image: grafana/loki:3.1.0
    container_name: acc_loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./infrastructure/monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring

  # ── Promtail — Log Shipper (Docker logs → Loki) ────────────────
  promtail:
    image: grafana/promtail:3.1.0
    container_name: acc_promtail
    restart: unless-stopped
    volumes:
      - ./infrastructure/monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - monitoring
      - default

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  monitoring:
    driver: bridge
