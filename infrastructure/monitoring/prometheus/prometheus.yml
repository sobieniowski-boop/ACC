# Prometheus Configuration — ACC
# Scrapes: FastAPI /metrics, Redis exporter, Node exporter

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "alerts.yml"

scrape_configs:
  # ── ACC FastAPI API ──────────────────────────────────────────────
  - job_name: "acc-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["acc_api:8000"]
        labels:
          service: "api"
          environment: "dev"
    scrape_interval: 10s

  # ── Prometheus self-monitoring ───────────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── Redis (via built-in INFO metrics) ────────────────────────────
  # Use redis_exporter sidecar in production; for dev, API /health/deep covers Redis
  # - job_name: "redis"
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]
